<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元気ない時の猫システム 🐱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
.wrap{width:100%;max-width:420px}
h1{font-size:20px;font-weight:600;text-align:center;margin-bottom:0.4rem;color:#1a1a1a}
.sub{font-size:14px;color:#888;text-align:center;margin-bottom:1.5rem}
.mood-btn{background:#fff;border:1px solid #e0ddd6;border-radius:14px;padding:14px 16px;cursor:pointer;text-align:left;width:100%;transition:background 0.15s,border-color 0.15s;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.mood-btn:hover{background:#f3f2ee;border-color:#bbb}
.emoji{font-size:26px;line-height:1;flex-shrink:0}
.mood-label{font-size:15px;font-weight:600;color:#1a1a1a}
.mood-sub{font-size:12px;color:#999;margin-top:2px}
.result-card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e0ddd6}
.cat-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.result-body{padding:1.25rem}
.msg{font-size:16px;line-height:1.75;color:#1a1a1a;margin-bottom:1rem}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:8px;font-weight:600;margin-right:8px}
.catname{font-size:12px;color:#aaa}
.back-btn{background:none;border:1px solid #ddd;border-radius:10px;padding:10px;cursor:pointer;font-size:13px;color:#888;margin-top:1rem;width:100%}
.back-btn:hover{background:#f5f5f5}
#screen-result{display:none;margin-top:0}
.title-emoji{font-size:28px;display:block;text-align:center;margin-bottom:0.5rem}
</style>
</head>
<body>
<div class="wrap">

<div id="screen-select">
  <span class="title-emoji">🐱</span>
  <h1>今の気分は？</h1>
  <p class="sub">選ぶと猫と一言が届くよ</p>
  <div id="mood-list"></div>
</div>

<div id="screen-result">
  <div class="result-card">
    <img class="cat-img" id="result-img" src="" alt="">
    <div class="result-body">
      <p class="msg" id="result-msg"></p>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
        <span class="badge" id="result-badge"></span>
        <span class="catname" id="result-cat"></span>
      </div>
      <button class="back-btn" onclick="goBack()">← 別の気分を選ぶ</button>
    </div>
  </div>
</div>

</div>

function renderMoods(){
  const list = document.getElementById('mood-list');
  list.innerHTML='';
  MOODS.forEach(m=>{
    const btn=document.createElement('button');
    btn.className='mood-btn';
    btn.innerHTML=`<span class="emoji">${m.emoji}</span><div><div class="mood-label">${m.label}</div><div class="mood-sub">${m.sub}</div></div>`;
    btn.onclick=()=>showResult(m);
    list.appendChild(btn);
  });
}

function showResult(mood){
  const keys=Object.keys(MESSAGES[mood.id]);
  const catKey=keys[Math.floor(Math.random()*keys.length)];
  const msg=MESSAGES[mood.id][catKey];
  const cat=CATS.find(c=>c.key===catKey);
  document.getElementById('result-img').src=IMGS[catKey];
  document.getElementById('result-img').alt=cat.name;
  document.getElementById('result-msg').textContent=msg;
  const badge=document.getElementById('result-badge');
  badge.textContent=mood.badge;
  badge.style.background=mood.color;
  badge.style.color=mood.textColor;
  document.getElementById('result-cat').textContent=cat.name+' / '+cat.desc;
  document.getElementById('screen-select').style.display='none';
  document.getElementById('screen-result').style.display='block';
  window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('screen-select').style.display='block';
  document.getElementById('screen-result').style.display='none';
}
